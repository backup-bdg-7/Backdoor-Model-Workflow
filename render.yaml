# Render.yaml configuration for multi-service deployment
# This configuration is optimized for Render.com's free tier
# Free tier has ephemeral storage, so we use /tmp directory

services:
  # API Service - Handles API requests and coordinates other services
  - type: web
    name: model-trainer-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app.api.main:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 400  # Stay within free tier limits
      - key: STORAGE_DIR
        value: /tmp
      - key: PYTHONUNBUFFERED
        value: true

  # Training Service - Dedicated to model training
  - type: worker
    name: model-trainer-training
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.services.training_worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 450  # Stay within free tier limits
      - key: STORAGE_DIR
        value: /tmp
      - key: PYTHONUNBUFFERED
        value: true

  # Monitoring Service - Tracks and visualizes training progress
  - type: web
    name: model-trainer-monitor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.services.monitor:app
    healthCheckPath: /monitor/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 250  # Stay within free tier limits
      - key: STORAGE_DIR
        value: /tmp
      - key: PYTHONUNBUFFERED
        value: true

  # Frontend Service - Serves the web UI for interaction
  - type: web
    name: model-trainer-frontend
    env: static
    plan: free
    buildCommand: cd app/frontend && npm install && npm run build
    staticPublishPath: ./app/frontend/build
    envVars:
      - key: API_URL
        fromService:
          name: model-trainer-api
          type: web
          property: hostport
