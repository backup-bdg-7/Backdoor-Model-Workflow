services:
  # API Service - Handles API requests and background training tasks
  - type: web
    name: model-trainer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app.api.main:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 350  # Conservative to stay under 512 MB
      - key: STORAGE_DIR
        value: /tmp
      - key: PYTHONUNBUFFERED
        value: true

  # Monitoring Service - Tracks and visualizes training progress
  - type: web
    name: model-trainer-monitor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.services.monitor:app
    healthCheckPath: /monitor/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: MAX_MEMORY_MB
        value: 200  # Conservative to stay under 512 MB
      - key: STORAGE_DIR
        value: /tmp
      - key: PYTHONUNBUFFERED
        value: true

  # Frontend Service - Serves the web UI for interaction
  - type: web
    name: model-trainer-frontend
    env: static
    plan: free
    buildCommand: cd app/frontend && npm install && npm run build
    staticPublishPath: app/frontend/build
    envVars:
      - key: API_URL
        fromService:
          name: model-trainer-api
          type: web
          property: hostport